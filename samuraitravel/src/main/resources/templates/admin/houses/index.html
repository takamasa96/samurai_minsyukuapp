<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <th:block th:replace="~{fragment :: meta}"></th:block>
    <th:block th:replace="~{fragment :: styles}"></th:block>
    <title>民宿一覧</title>
</head>

<body>
<div class="samuraitravel-wrapper">
    <div th:replace="~{fragment :: header}"></div>

    <main>
        <div class="container pt-4 pb-5 samuraitravel-container">
            <div class="row justify-content-center">
                <div class="col-xxl-9 col-xl-10 col-lg-11">

                    <h1 class="mb-4 text-center">民宿一覧</h1>

                    <div class="d-flex justify-content-between align-items-end flex-wrap">
                        <form method="get" th:action="@{/admin/houses}" class="mb-3">
                            <div class="input-group">
                                <input type="text" class="form-control" name="keyword"
                                       th:value="${keyword}" placeholder="民宿名">
                                <button type="submit"
                                        class="btn text-white shadow-sm samuraitravel-btn">検索</button>
                            </div>
                        </form>
                          <a th:href="@{/admin/houses/register}" class="btn text-white shadow-sm mb-3 samuraitravel-btn">登録</a>
                    </div>
                    
                       <div th:if="${errorMessage}" class="alert alert-danger">
                                <span th:text="${errorMessage}"></span>
                            </div> 

                    <table class="table">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>民宿名</th>
                            <th>郵便番号</th>
                            <th>住所</th>
                            <th>電話番号</th>
                            <th></th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="house : ${housePage}">
                            <td th:text="${house.id}"></td>
                            <td th:text="${house.name}"></td>
                            <td th:text="${house.postalCode}"></td>
                            <td th:text="${house.address}"></td>
                            <td th:text="${house.phoneNumber}"></td>
                            <td><a th:href="@{/admin/houses/__${house.id}__}">詳細</a></td>
                        </tr>
                        </tbody>
                    </table>

                </div>
            </div>
        </div>
    </main>

    <div th:replace="~{fragment :: footer}"></div>
</div>

<th:block th:replace="~{fragment :: scripts}"></th:block>
</body>
</html>
